<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פאזל חיות לילדים - כלב איורי</title>
    <style>
        :root {
            --bg-color: #e0f2f1;
            --slot-border: rgba(0,0,0,0.3);
            --highlight-final: #fff59d;
        }

        * { box-sizing: border-box; touch-action: none; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* מסך פתיחה */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            visibility: visible;
            opacity: 1;
            transition: opacity 0.5s;
        }

        #start-button {
            padding: 25px 50px; font-size: 32px; font-weight: bold;
            background: #ff7043; color: white; border: none; border-radius: 25px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(255,112,67,0.5);
        }

        #game-container {
            display: flex;
            flex-direction: column;
            width: 100%; max-width: 800px;
            height: 90%; gap: 30px; padding: 20px;
            align-items: center;
        }

        #puzzle-board {
            flex: 2; display: flex;
            flex-direction: row;
            justify-content: center; align-items: center;
            background: rgba(255,255,255,0.9); border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            padding: 20px;
        }

        .slot {
            width: 150px;
            height: 400px;
            border: 2px dashed var(--slot-border);
            position: relative;
            display: flex; justify-content: center;
        }

        .slot-label {
            position: absolute; bottom: -45px;
            font-size: 36px; font-weight: bold; color: #333;
        }

        #pieces-area {
            flex: 1; width: 100%; position: relative;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            min-height: 150px;
        }

        .puzzle-part {
            width: 150px; height: 400px;
            cursor: grab;
            position: absolute;
            z-index: 10;
            background-repeat: no-repeat;
            background-size: 450px 400px;
            border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-button">התחל משחק 🐾</button>
    </div>

    <div id="game-container">
        <div id="puzzle-board">
            <div id="slot-0" class="slot" data-order="0"><div class="slot-label">כ</div></div>
            <div id="slot-1" class="slot" data-order="1"><div class="slot-label">ל</div></div>
            <div id="slot-2" class="slot" data-order="2"><div class="slot-label">ב</div></div>
        </div>
        <div id="pieces-area"></div>
    </div>

        const startButton = document.getElementById('start-button');
        const startOverlay = document.getElementById('start-overlay');
        const piecesArea = document.getElementById('pieces-area');

        // פונקציית ההפעלה שחייבת להיות קיימת
        startButton.onclick = function() {
            startOverlay.style.opacity = '0';
            setTimeout(() => {
                startOverlay.style.display = 'none';
                initGame();
            }, 500);
        };

        function initGame() {
            const positions = [0, 1, 2];
            // ערבוב סדר החלקים
            positions.sort(() => Math.random() - 0.5);

            positions.forEach((id, index) => {
                const piece = document.createElement('div');
                piece.className = 'puzzle-part';
                piece.style.backgroundImage = `url(${dogFullImage})`;
                piece.style.backgroundPosition = `-${id * 150}px 0px`;
                
                // פיזור ראשוני באזור החלקים
                piece.style.left = (index * 170 + 20) + 'px';
                piece.style.top = '10px';
                
                // הפיכת החלק לנגרר
                makeElementDraggable(piece);
                piecesArea.appendChild(piece);
            });
        }

        function makeElementDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            
            el.onmousedown = dragMouseDown;
            el.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                pos3 = clientX;
                pos4 = clientY;
                document.onmouseup = closeDragElement;
                document.ontouchend = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
                pos1 = pos3 - clientX;
                pos2 = pos4 - clientY;
                pos3 = clientX;
                pos4 = clientY;
                el.style.top = (el.offsetTop - pos2) + "px";
                el.style.left = (el.offsetLeft - pos1) + "px";
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }
    </script>
</body>
