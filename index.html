<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פאזל חיות לילדים - כלב איורי</title>
    <style>
        :root {
            --bg-color: #e0f2f1; /* תכלת-ים בהיר נעים */
            --slot-border: rgba(0,0,0,0.3);
            --highlight-final: #fff59d; /* צהוב זוהר רך */
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
            overflow: hidden; /* מונע גלילה בנייד */
        }

        /* מסך פתיחה חובה לסאונד בנייד */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        #start-button {
            padding: 25px 50px; font-size: 32px; font-weight: bold;
            background: #ff7043; color: white; border: none; border-radius: 25px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(255,112,67,0.5);
            transition: transform 0.1s ease;
        }
        #start-button:active { transform: scale(0.95); }

        #game-container {
            display: flex; flex-direction: column;
            width: 100%; max-width: 800px;
            height: 90%; gap: 30px; padding: 20px;
        }

        /* לוח הפאזל: הסלוטים צמודים! */
        #puzzle-board {
            flex: 2; display: flex;
            flex-direction: row; /* מסדר מימין לשמאל ע"פ dir="rtl" */
            justify-content: center; align-items: center;
            background: rgba(255,255,255,0.9); border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden; /* שומר על הפינות המעוגלות */
            position: relative;
        }

        /* סלוט - ללא רווחים (gap: 0) */
        .slot {
            width: 150px; /* גודל החלקים */
            height: 400px;
            border: 2px dashed var(--slot-border);
            position: relative;
            display: flex; justify-content: center;
        }

        /* הכיתוב מתחת לסלוט */
        .slot-label {
            position: absolute; bottom: -45px;
            font-size: 36px; font-weight: bold; color: #333;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        /* אזור החלקים הנגררים */
        #pieces-area {
            flex: 1; position: relative;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
            display: flex; justify-content: space-around; align-items: center;
        }

        /* חלק פאזל - נראה כמו איור מתוק! */
        .puzzle-part {
            width: 150px; height: 400px;
            cursor: grab; touch-action: none;
            position: absolute; /* חובה לגרירה */
            z-index: 10;
            background-repeat: no-repeat;
            background-size: 450px 400px; /* תמונה מלאה של 3 חלקים של 150px */
            border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s ease, filter 0.2s ease, box-shadow 0.2s ease;
        }

        /* כשהחלק מוצמד לסלוט */
        .puzzle-part.dropped {
            cursor: default;
            border: none;
            box-shadow: none; /* מסיר את הצל כדי שיראה כמו תמונה אחת */
            border-radius: 0; /* מצמיד את הפינות */
        }

        /* הדגשה בזמן ההקראה הסופית */
        .highlight {
            filter: drop-shadow(0 0 20px var(--highlight-final)) brightness(1.1);
            z-index: 20; /* מעל חלקים אחרים */
            transition: filter 0.3s ease;
        }

    </style>
</head>
