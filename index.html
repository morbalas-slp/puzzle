<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פאזל חיות לילדים - כלב איורי</title>
    <style>
        :root {
            --bg-color: #e0f2f1;
            --slot-border: rgba(0,0,0,0.3);
            --highlight-final: #fff59d;
        }

        * { box-sizing: border-box; touch-action: none; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* מסך פתיחה */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
        }
        
        #start-button {
            padding: 25px 50px; font-size: 32px; font-weight: bold;
            background: #ff7043; color: white; border: none; border-radius: 25px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(255,112,67,0.5);
        }

        #game-container {
            display: none; /* מוסתר עד שלוחצים על התחל */
            flex-direction: column;
            width: 100%; max-width: 800px;
            height: 90vh; gap: 30px; padding: 20px;
            align-items: center;
        }

        #puzzle-board {
            display: flex;
            flex-direction: row;
            justify-content: center;
            background: rgba(255,255,255,0.9); border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            padding: 10px;
        }

        .slot {
            width: 150px;
            height: 400px;
            border: 2px dashed var(--slot-border);
            position: relative;
            display: flex; justify-content: center;
        }

        .slot-label {
            position: absolute; bottom: -50px;
            font-size: 36px; font-weight: bold; color: #333;
        }

        #pieces-area {
            width: 100%;
            height: 200px;
            position: relative;
            background: rgba(255,255,255,0.3);
            border-radius: 20px;
            margin-top: 50px;
        }

        .puzzle-part {
            width: 150px; height: 400px;
            cursor: grab;
            position: absolute;
            z-index: 10;
            background-repeat: no-repeat;
            background-size: 450px 400px;
            border-radius: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* מיקומי הרקע לכל חלק בפאזל */
        #part-0 { background-position: 0 0; }
        #part-1 { background-position: -150px 0; }
        #part-2 { background-position: -300px 0; }

    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-button">התחל משחק 🐾</button>
    </div>

    <div id="game-container">
        <div id="puzzle-board">
            <div id="slot-0" class="slot" data-order="0"><div class="slot-label">כ</div></div>
            <div id="slot-1" class="slot" data-order="1"><div class="slot-label">ל</div></div>
            <div id="slot-2" class="slot" data-order="2"><div class="slot-label">ב</div></div>
        </div>

        <div id="pieces-area">
            </div>
    </div>

    <script>
        const startButton = document.getElementById('start-button');
        const startOverlay = document.getElementById('start-overlay');
        const gameContainer = document.getElementById('game-container');
        const piecesArea = document.getElementById('pieces-area');

        // תמונת הכלב שהבאת (מקוצרת לצורך הדוגמה, השתמשי במלאה שלך)
        const dogImg = 'https://via.placeholder.com/450x400/FF7043/FFFFFF?text=DOG+IMAGE'; 

        // פונקציה להתחלת המשחק
        startButton.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            gameContainer.style.display = 'flex';
            initGame();
        });

        function initGame() {
            const orders = [0, 1, 2];
            orders.sort(() => Math.random() - 0.5); // ערבוב חלקים

            orders.forEach((id, index) => {
                const piece = document.createElement('div');
                piece.className = 'puzzle-part';
                piece.id = `part-${id}`;
                piece.style.backgroundImage = `url(${dogImg})`;
                piece.style.left = (index * 160) + 'px';
                piece.style.top = '20px';
                
                // הוספת יכולת גרירה בסיסית
                makeDraggable(piece);
                piecesArea.appendChild(piece);
            });
        }

        function makeDraggable(el) {
            let posX = 0, posY = 0, initialX = 0, initialY = 0;

            el.addEventListener('mousedown', dragStart);
            el.addEventListener('touchstart', dragStart, {passive: false});

            function dragStart(e) {
                e.preventDefault();
                if (e.type === "touchstart") {
                    initialX = e.touches[0].clientX - posX;
                    initialY = e.touches[0].clientY - posY;
                } else {
                    initialX = e.clientX - posX;
                    initialY = e.clientY - posY;
                }
                document.addEventListener('mousemove', drag);
                document.addEventListener('mouseup', dragEnd);
                document.addEventListener('touchmove', drag, {passive: false});
                document.addEventListener('touchend', dragEnd);
            }

            function drag(e) {
                if (e.type === "touchmove") {
                    posX = e.touches[0].clientX - initialX;
                    posY = e.touches[0].clientY - initialY;
                } else {
                    posX = e.clientX - initialX;
                    posY = e.clientY - initialY;
                }
                el.style.transform = `translate(${posX}px, ${posY}px)`;
            }

            function dragEnd() {
                document.removeEventListener('mousemove', drag);
                document.removeEventListener('mouseup', dragEnd);
                document.removeEventListener('touchmove', drag);
                document.removeEventListener('touchend', dragEnd);
                
                // כאן אפשר להוסיף לוגיקה לבדיקה אם החלק קרוב לסלוט הנכון
            }
        }
    </script>
</body>
</html>
